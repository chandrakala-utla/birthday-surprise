<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Secret Surprise ❤️</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<link
			href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
			rel="stylesheet"
		/>

		<link rel="stylesheet" href="style.css?v=3">

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
		/>
	</head>

	<body>
		<div class="overlay"></div>

		<div id="stars"></div>

		<div id="hearts"></div>

		<div id="shooting-stars"></div>

		<div class="glow"></div>

		<div class="landing">
			<div class="glass password-card">
				<i class="fa-solid fa-lock lock-icon"></i>

				<h1>Secret <span>Door</span></h1>

				<p>
					Only one special person knows the password to open this surprise.
				</p>

				<div class="password-box">
					<input type="password" id="password" placeholder="Enter Password" />

					<i class="fa-solid fa-eye" id="togglePassword"></i>
				</div>

				<button id="continueBtn"> Continue </button>

				<p class="hint"> Hint ❤️ Your Nickname </p>

				<p id="errorMessage"></p>
			</div>
		</div>

		<script src="script.js"></script>
	</body>
</html>
